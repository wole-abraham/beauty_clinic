server {
    listen 80;
    server_name marynassifchbat.com www.marynassifchbat.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name marynassifchbat.com www.marynassifchbat.com;

    # SSL — fill in your cert paths (e.g. from certbot)
    ssl_certificate     /etc/letsencrypt/live/marynassifchbat.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/marynassifchbat.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Proxy everything to FastAPI
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
